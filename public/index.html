<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Werewolfware</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="nav-page">
    <div class="nav-hero">
      <h1 class="logo">🐺 Werewolfware</h1>
      <p class="tagline">Deceive. Vote. Survive.</p>
    </div>
    <div class="nav-cards">
      <a href="/admin" class="nav-card nav-card--admin">
        <div class="nav-card__icon">⚙️</div>
        <div class="nav-card__label">Admin</div>
        <div class="nav-card__desc">Create &amp; host a game. Set timers, assign roles, control the flow.</div>
      </a>
      <a href="/join" class="nav-card nav-card--join">
        <div class="nav-card__icon">🔗</div>
        <div class="nav-card__label">Join</div>
        <div class="nav-card__desc">Enter a game ID or scan a QR code to join a session.</div>
      </a>
      <a href="/player" class="nav-card nav-card--player">
        <div class="nav-card__icon">🎮</div>
        <div class="nav-card__label">Player</div>
        <div class="nav-card__desc">Return to your game in progress. Resume your role and chat.</div>
      </a>
    </div>
  </div>
</body>
</html>
