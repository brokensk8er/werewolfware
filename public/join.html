<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Game — Werewolfware</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="centered-page">
    <a href="/" class="back-link">← Werewolfware</a>
    <div class="form-card">
      <h1>Join a Game</h1>
      <p class="form-card__sub">Pick a name to jump in.</p>
      <label class="field-label" for="player-name">Your Name</label>
      <input id="player-name" class="input" type="text" maxlength="20" placeholder="e.g. Ragnar" autocomplete="off" />
      <button id="btn-join" class="btn btn-primary btn-block">Join Game</button>
      <p id="join-error" class="error hidden"></p>
    </div>
  </div>
  <script src="/join.js"></script>
</body>
</html>
