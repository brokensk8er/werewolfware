<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Werewolf - Social Deduction Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="lobby-screen" class="screen">
      <div class="container">
        <h1>🐺 Werewolf</h1>
        <p class="subtitle">A social deduction party game</p>

        <div class="options">
          <button id="create-btn" class="btn btn-primary">Create Game</button>
          <button id="join-btn" class="btn btn-secondary">Join Game</button>
        </div>

        <div id="create-form" class="form hidden">
          <h2>Create a Game</h2>
          <input
            type="text"
            id="creator-name"
            placeholder="Your name"
            class="input"
          >
          <button id="create-submit" class="btn btn-primary">Create</button>
          <button id="create-cancel" class="btn btn-secondary">Cancel</button>
        </div>

        <div id="join-form" class="form hidden">
          <h2>Join a Game</h2>
          <input
            type="text"
            id="room-code"
            placeholder="Room code"
            class="input"
            maxlength="6"
          >
          <input
            type="text"
            id="player-name"
            placeholder="Your name"
            class="input"
          >
          <button id="join-submit" class="btn btn-primary">Join</button>
          <button id="join-cancel" class="btn btn-secondary">Cancel</button>
        </div>
      </div>
    </div>

    <div id="lobby-wait-screen" class="screen hidden">
      <div class="container">
        <h1>Room <span id="room-code-display"></span></h1>
        <p>Waiting for players...</p>

        <div class="player-list">
          <h3>Players</h3>
          <ul id="players-ul"></ul>
        </div>

        <div id="game-controls" class="hidden">
          <button id="start-game-btn" class="btn btn-primary">Start Game</button>
        </div>
      </div>
    </div>

    <div id="game-screen" class="screen hidden">
      <div class="container">
        <div class="header">
          <h1 id="phase-title">Phase</h1>
          <div class="timer">
            <span id="timer">30s</span>
          </div>
        </div>

        <div class="game-content">
          <div id="role-card" class="role-card">
            <h2 id="role-name">Role</h2>
            <p id="role-description">Description</p>
          </div>

          <div id="day-phase" class="phase-content hidden">
            <h2>Day Discussion</h2>
            <p>Vote to eliminate a player</p>
            <div id="vote-list" class="player-grid"></div>
          </div>

          <div id="night-phase" class="phase-content hidden">
            <h2>Night Actions</h2>
            <p id="night-instruction">Choose your target...</p>
            <div id="target-list" class="player-grid"></div>
          </div>

          <div id="game-ended" class="phase-content hidden">
            <h2 id="winner-title">Game Over</h2>
            <p id="win-reason">Reason</p>
            <button id="play-again-btn" class="btn btn-primary">Return to Lobby</button>
          </div>
        </div>

        <div class="player-list">
          <h3>Players</h3>
          <ul id="game-players-ul"></ul>
        </div>
      </div>
    </div>

    <div id="error-screen" class="error-alert hidden">
      <p id="error-message"></p>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="client.js"></script>
</body>
</html>
