<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Werewolf — Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- Auth gate overlay -->
  <div id="auth-gate">
    <p>Verifying admin access…</p>
  </div>

  <!-- Main dashboard (hidden until authed) -->
  <div id="dashboard" class="hidden">

    <!-- Top bar -->
    <header id="topbar">
      <div class="topbar-left">
        <span class="topbar-logo">🐺 Werewolf Admin</span>
        <span id="topbar-phase" class="topbar-badge phase-badge hidden"></span>
      </div>
      <div class="topbar-right">
        <span id="topbar-user" class="topbar-email"></span>
        <button id="logout-btn" class="btn-ghost">Sign out</button>
      </div>
    </header>

    <!-- No active game panel -->
    <div id="no-game-panel" class="hidden">
      <div class="picker-card">
        <h2>No Active Game</h2>
        <p class="picker-sub">No game is currently running. Create one to get started.</p>
        <button id="create-game-btn" class="btn-primary">Create Game</button>
        <p id="picker-error" class="picker-error"></p>
      </div>
    </div>

    <!-- Mobile tab nav (hidden on desktop via CSS) -->
    <nav id="mobile-tabs" class="hidden">
      <button class="tab-btn active" data-tab="players">Players</button>
      <button class="tab-btn" data-tab="controls">Controls</button>
      <button class="tab-btn" data-tab="log">Log</button>
    </nav>

    <!-- Main layout -->
    <main id="main-layout" class="hidden">

      <!-- LEFT: Players + Controls (desktop sidebar / mobile tab panes) -->
      <aside id="left-panel">

        <!-- Tab pane: Players -->
        <div class="tab-pane tab-active" data-tab="players">

          <section class="panel">
            <div class="panel-header">
              <h3>Players</h3>
              <span id="player-count" class="badge">0</span>
            </div>
            <div id="player-list"></div>
          </section>

          <!-- Lobby-only controls -->
          <section id="lobby-controls" class="panel hidden">
            <div class="panel-header"><h3>Lobby Controls</h3></div>
            <div class="ctrl-group">
              <label class="ctrl-label">Add Player</label>
              <div class="picker-row">
                <input type="text" id="add-player-input" class="input-sm" placeholder="Player name" maxlength="32">
                <button id="add-player-btn" class="btn-secondary">Add</button>
              </div>
            </div>
            <button id="start-game-btn" class="btn-primary full-width" disabled>▶ Start Game</button>
            <p id="start-game-hint" class="muted" style="margin-top:0.4rem;text-align:center">Need at least 5 players</p>
          </section>

        </div><!-- /tab-pane players -->

        <!-- Tab pane: Controls -->
        <div class="tab-pane" data-tab="controls">

          <section class="panel">
            <div class="panel-header"><h3>Phase Controls</h3></div>

            <div class="control-row">
              <span class="ctrl-label">Current Phase</span>
              <span id="ctrl-phase" class="phase-pill">—</span>
            </div>

            <div class="control-row">
              <span class="ctrl-label">Timer</span>
              <span id="ctrl-timer" class="timer-display">—</span>
            </div>

            <div class="ctrl-group">
              <label class="ctrl-label">Set timer (minutes)</label>
              <div class="picker-row">
                <input type="number" id="timer-input" value="1" min="1" max="60" step="0.5" class="input-sm">
                <button id="set-timer-btn" class="btn-secondary">Set</button>
              </div>
            </div>

            <button id="advance-phase-btn" class="btn-primary full-width">⏭ Advance Phase</button>
            <button id="randomize-btn" class="btn-secondary full-width hidden" style="margin-top:0.5rem">🎲 Randomize Actions</button>
            <button id="end-game-btn" class="btn-danger full-width" style="margin-top:0.5rem">🛑 End Game</button>
          </section>

          <section class="panel">
            <div class="panel-header"><h3>Vote Tally</h3></div>
            <div id="vote-tally">
              <p class="muted">No active vote.</p>
            </div>
          </section>

        </div><!-- /tab-pane controls -->

      </aside>

      <!-- RIGHT: Event Log (desktop column / mobile tab pane) -->
      <section id="right-panel" class="tab-pane" data-tab="log">
        <div class="panel full-height">
          <div class="panel-header log-header">
            <h3>Event Log</h3>
            <div class="log-filters">
              <button class="filter-btn active" data-cat="all">All</button>
              <button class="filter-btn" data-cat="system">System</button>
              <button class="filter-btn" data-cat="chat">Chat</button>
              <button class="filter-btn" data-cat="seer">Seer</button>
              <button class="filter-btn" data-cat="werewolf">Werewolf</button>
              <button class="filter-btn" data-cat="private">Private</button>
            </div>
          </div>
          <div id="event-log"></div>
        </div>
      </section>

    </main>

  </div><!-- /dashboard -->

  <!-- Player action modal -->
  <div id="player-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-player-name">Player</h3>
        <button id="modal-close" class="btn-ghost">✕</button>
      </div>
      <div class="modal-body">
        <div class="ctrl-group">
          <label class="ctrl-label">Rename Player</label>
          <div class="picker-row">
            <input type="text" id="rename-input" class="input-sm" placeholder="New name" maxlength="32">
            <button id="rename-btn" class="btn-secondary">Rename</button>
          </div>
        </div>
        <div class="ctrl-group">
          <label class="ctrl-label">Change Role</label>
          <select id="role-select" class="input-sm full-width">
            <option value="villager">Villager</option>
            <option value="werewolf">Werewolf</option>
            <option value="seer">Seer</option>
            <option value="doctor">Doctor</option>
          </select>
          <button id="change-role-btn" class="btn-secondary full-width" style="margin-top:0.5rem">Apply Role Change</button>
        </div>
        <div id="night-action-group" class="ctrl-group hidden">
          <label class="ctrl-label">Submit Night Action</label>
          <div class="picker-row">
            <select id="night-target-select" class="input-sm"></select>
            <button id="night-action-btn" class="btn-secondary">Submit</button>
          </div>
        </div>
        <div id="vote-group" class="ctrl-group hidden">
          <label class="ctrl-label">Cast Vote</label>
          <div class="picker-row">
            <select id="vote-target-select" class="input-sm"></select>
            <button id="vote-btn" class="btn-secondary">Vote</button>
          </div>
        </div>
        <div class="modal-actions">
          <button id="remove-player-btn" class="btn-danger hidden">🗑 Remove from Lobby</button>
          <button id="eliminate-btn" class="btn-danger hidden">⚡ Force Eliminate</button>
          <button id="kick-btn" class="btn-danger hidden">🚫 Kick from Game</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
