<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Werewolf — Admin Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 0.75rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    h1 { font-size: 1.4rem; color: #fff; text-align: center; }
    .subtitle { font-size: 0.85rem; color: #888; text-align: center; margin-top: -0.75rem; }
    label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 0.3rem; }
    input {
      width: 100%;
      background: #111;
      border: 1px solid #444;
      border-radius: 0.4rem;
      color: #fff;
      padding: 0.6rem 0.8rem;
      font-size: 0.95rem;
      outline: none;
    }
    input:focus { border-color: #8b0000; }
    button {
      width: 100%;
      background: #8b0000;
      color: #fff;
      border: none;
      border-radius: 0.4rem;
      padding: 0.7rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #a00000; }
    button:disabled { background: #444; cursor: not-allowed; }
    #error-msg { color: #f87171; font-size: 0.85rem; text-align: center; min-height: 1.2rem; }
    #status-msg { color: #888; font-size: 0.8rem; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐺 Werewolf Admin</h1>
    <p class="subtitle">Sign in with your moderator account</p>

    <div>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div>
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <p id="error-msg"></p>
    <button id="login-btn">Sign In</button>
    <p id="status-msg">Checking session…</p>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import {
      getFirestore,
      doc,
      getDoc,
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAXcvi644izGZhK8nPGlkfV4vAc3ZWPH8w",
      authDomain: "nodicetools.firebaseapp.com",
      databaseURL: "https://nodicetools-default-rtdb.firebaseio.com",
      projectId: "nodicetools",
      storageBucket: "nodicetools.firebasestorage.app",
      messagingSenderId: "387258889697",
      appId: "1:387258889697:web:5467488ab109ea67b74ea0",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const statusMsg = document.getElementById('status-msg');
    const errorMsg  = document.getElementById('error-msg');
    const loginBtn  = document.getElementById('login-btn');

    async function checkAdminAndRedirect(user) {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists() && snap.data().isAdmin === true) {
        window.location.href = '/admin.html';
      } else {
        await auth.signOut();
        errorMsg.textContent = 'This account does not have admin access.';
        statusMsg.textContent = '';
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        statusMsg.textContent = 'Verifying admin access…';
        await checkAdminAndRedirect(user);
      } else {
        statusMsg.textContent = '';
      }
    });

    loginBtn.addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      errorMsg.textContent = '';

      if (!email || !password) {
        errorMsg.textContent = 'Please enter email and password.';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        await checkAdminAndRedirect(cred.user);
      } catch (e) {
        errorMsg.textContent = 'Invalid credentials.';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
