<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Werewolf — Admin Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 0.75rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      align-items: center;
    }
    h1 { font-size: 1.4rem; color: #fff; text-align: center; }
    .subtitle { font-size: 0.85rem; color: #888; text-align: center; margin-top: -0.75rem; }
    #google-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 0.4rem;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      justify-content: center;
    }
    #google-btn:hover { background: #f0f0f0; }
    #google-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #google-btn svg { flex-shrink: 0; }
    #error-msg { color: #f87171; font-size: 0.85rem; text-align: center; min-height: 1.2rem; }
    #status-msg { color: #888; font-size: 0.8rem; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐺 Werewolf Admin</h1>
    <p class="subtitle">Sign in with your moderator account</p>

    <p id="error-msg"></p>

    <button id="google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>

    <p id="status-msg">Checking session…</p>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getAuth,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged,
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import {
      getFirestore,
      doc,
      getDoc,
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAXcvi644izGZhK8nPGlkfV4vAc3ZWPH8w",
      authDomain: "nodicetools.firebaseapp.com",
      databaseURL: "https://nodicetools-default-rtdb.firebaseio.com",
      projectId: "nodicetools",
      storageBucket: "nodicetools.firebasestorage.app",
      messagingSenderId: "387258889697",
      appId: "1:387258889697:web:5467488ab109ea67b74ea0",
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const db       = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const statusMsg = document.getElementById('status-msg');
    const errorMsg  = document.getElementById('error-msg');
    const googleBtn = document.getElementById('google-btn');

    async function checkAdminAndRedirect(user) {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists() && snap.data().isAdmin === true) {
        window.location.href = 'admin.html';
      } else {
        await auth.signOut();
        errorMsg.textContent = 'This Google account does not have admin access.';
        statusMsg.textContent = '';
        googleBtn.disabled = false;
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        statusMsg.textContent = 'Verifying admin access…';
        await checkAdminAndRedirect(user);
      } else {
        statusMsg.textContent = '';
      }
    });

    googleBtn.addEventListener('click', async () => {
      errorMsg.textContent = '';
      googleBtn.disabled = true;
      try {
        const cred = await signInWithPopup(auth, provider);
        await checkAdminAndRedirect(cred.user);
      } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') {
          errorMsg.textContent = 'Sign-in failed. Please try again.';
        }
        googleBtn.disabled = false;
        statusMsg.textContent = '';
      }
    });
  </script>
</body>
</html>
